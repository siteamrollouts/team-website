const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const GAME_W = 800;
const GAME_H = 500;
canvas.width = GAME_W;
canvas.height = GAME_H;

// Auto-focus so keyboard works immediately (even inside iframe)
window.focus();
document.body.tabIndex = 0;
document.body.focus();

// Responsive scaling
function resize() {
  const container = document.getElementById('gameContainer');
  const scale = Math.min(container.clientWidth / GAME_W, container.clientHeight / GAME_H);
  canvas.style.width = (GAME_W * scale) + 'px';
  canvas.style.height = (GAME_H * scale) + 'px';
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// INPUT
// ============================================================
const keys = {};
let clickX = -1, clickY = -1, clicked = false;
window.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.code] = false; });
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = GAME_W / rect.width;
  const scaleY = GAME_H / rect.height;
  clickX = (e.clientX - rect.left) * scaleX;
  clickY = (e.clientY - rect.top) * scaleY;
  clicked = true;
});
let mouseX = -1, mouseY = -1;
let cursorHideTimer = null;
function showCursor() {
  canvas.classList.remove('cursor-hidden');
  clearTimeout(cursorHideTimer);
  cursorHideTimer = setTimeout(() => canvas.classList.add('cursor-hidden'), 2000);
}
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (GAME_W / rect.width);
  mouseY = (e.clientY - rect.top) * (GAME_H / rect.height);
  showCursor();
});

function consumeClick() { const c = clicked; clicked = false; return c; }
function isKeyPressed(code) { return !!keys[code]; }
const justPressed = {};
function wasJustPressed(code) {
  if (keys[code] && !justPressed[code]) { justPressed[code] = true; return true; }
  if (!keys[code]) justPressed[code] = false;
  return false;
}

// ============================================================
// AUDIO (Web Audio API — simple chiptune sounds)
// ============================================================
let audioCtx = null;
let audioEnabled = true;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playTone(freq, duration, type = 'square', volume = 0.1) {
  if (!audioEnabled || !audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.value = volume;
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}
function sfxJump() { playTone(400, 0.1); setTimeout(() => playTone(600, 0.1), 50); }
function sfxCollect() { playTone(800, 0.08); setTimeout(() => playTone(1200, 0.12), 60); }
function sfxDeath() { playTone(200, 0.3, 'sawtooth', 0.15); setTimeout(() => playTone(100, 0.4, 'sawtooth', 0.1), 200); }
function sfxLevelComplete() {
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 0.2, 'square', 0.08), i * 120));
}
function sfxCountdown() { playTone(440, 0.15, 'square', 0.08); }
function sfxGo() { playTone(880, 0.3, 'square', 0.1); }
function sfxMenuSelect() { playTone(660, 0.08, 'square', 0.06); }

// Background music
let bgMusic = null;
let musicEnabled = true;
function initMusic() {
  if (bgMusic) return;
  bgMusic = new Audio('../assets/arcade-game-background-music-1.mp3');
  bgMusic.loop = true;
  bgMusic.volume = 0.25;
}
function startMusic() {
  if (!bgMusic) initMusic();
  if (musicEnabled && bgMusic.paused) {
    bgMusic.play().catch(() => {});
  }
}
function stopMusic() {
  if (bgMusic && !bgMusic.paused) bgMusic.pause();
}
function toggleMusic() {
  musicEnabled = !musicEnabled;
  audioEnabled = !audioEnabled;
  if (musicEnabled) startMusic();
  else stopMusic();
}
// Start music on first user interaction (browser requires gesture for audio)
let musicStarted = false;
function tryStartMusic() {
  if (musicStarted) return;
  musicStarted = true;
  initMusic();
  startMusic();
}
['keydown','mousedown','touchstart'].forEach(function(evt) {
  document.addEventListener(evt, tryStartMusic, { once: false, passive: true });

function drawPixelArt(data, x, y, pixelSize, flipX = false) {
  for (let row = 0; row < data.length; row++) {
    for (let col = 0; col < data[row].length; col++) {
      const color = data[row][col];
      if (color === 0 || color === '0' || color === ' ' || color === '') continue;
      ctx.fillStyle = typeof color === 'string' && color.startsWith('#') ? color : colorMap[color] || '#FF00FF';
      const drawCol = flipX ? (data[row].length - 1 - col) : col;
      ctx.fillRect(Math.floor(x + drawCol * pixelSize), Math.floor(y + row * pixelSize), pixelSize, pixelSize);
    }
  }
}

// Particles
let particles = [];
function spawnParticles(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6 - 2,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      color: color,
      size: 2 + Math.random() * 3,
    });
  }
}
function updateParticles() {
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life--;
    return p.life > 0;
  });
}
function drawParticles() {
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.floor(p.x), Math.floor(p.y), p.size, p.size);
  });
  ctx.globalAlpha = 1;
}

// Screen shake
let shakeX = 0, shakeY = 0, shakeIntensity = 0;
function triggerShake(intensity = 8) { shakeIntensity = intensity; }
function updateShake() {
  if (shakeIntensity > 0) {
    shakeX = (Math.random() - 0.5) * shakeIntensity;
    shakeY = (Math.random() - 0.5) * shakeIntensity;
    shakeIntensity *= 0.85;
    if (shakeIntensity < 0.5) { shakeIntensity = 0; shakeX = 0; shakeY = 0; }
  }
}

function drawPixelText(text, x, y, size, color = BRAND.white, centered = false) {
  const str = text.toUpperCase();
  const charW = 6 * size;
  const totalW = str.length * charW;
  const startX = centered ? x - totalW / 2 : x;

  ctx.fillStyle = color;
  for (let i = 0; i < str.length; i++) {
    const ch = PIXEL_CHARS[str[i]];
    if (!ch) continue;
    for (let row = 0; row < 5; row++) {
      for (let col = 0; col < 5; col++) {
        if (ch[row][col] === '1') {
          ctx.fillRect(
            Math.floor(startX + i * charW + col * size),
            Math.floor(y + row * size),
            size, size
          );
        }
      }
    }
  }
  return { w: totalW, h: 5 * size };
}

function drawButton(text, x, y, w, h, isHovered) {
  // Pixel art button
  const baseColor = isHovered ? BRAND.accent : BRAND.primary;
  const darkColor = isHovered ? '#c0547d' : '#4a3ea3';
  const lightColor = isHovered ? '#ff9fc4' : '#8a7ff0';

  // Shadow
  ctx.fillStyle = '#000000';
  ctx.fillRect(x + 3, y + 3, w, h);
  // Main
  ctx.fillStyle = baseColor;
  ctx.fillRect(x, y, w, h);
  // Highlight top/left
  ctx.fillStyle = lightColor;
  ctx.fillRect(x, y, w, 3);
  ctx.fillRect(x, y, 3, h);
  // Shadow bottom/right
  ctx.fillStyle = darkColor;
  ctx.fillRect(x, y + h - 3, w, 3);
  ctx.fillRect(x + w - 3, y, 3, h);

  drawPixelText(text, x + w / 2, y + h / 2 - 5, 2, BRAND.white, true);

  return mouseX >= x && mouseX <= x + w && mouseY >= y && mouseY <= y + h;
}

function isButtonClicked(x, y, w, h) {
  return clicked && clickX >= x && clickX <= x + w && clickY >= y && clickY <= y + h;
}

function generateLevel(levelIdx) {
  const design = LEVEL_DESIGNS[levelIdx];
  const segWidth = 10;
  const levelHeight = 15;
  const levelWidth = design.length * segWidth;
  const tiles = [];

  // Init empty
  for (let y = 0; y < levelHeight; y++) {
    tiles[y] = [];
    for (let x = 0; x < levelWidth; x++) {
      tiles[y][x] = 0;
    }
  }

  // Stitch segments
  for (let s = 0; s < design.length; s++) {
    const seg = SEGMENTS[design[s]];
    if (!seg) continue;
    const ox = s * segWidth;
    for (let y = 0; y < levelHeight; y++) {
      const row = seg[y];
      for (let x = 0; x < segWidth; x++) {
        const ch = row[x];
        switch (ch) {
          case 'g': tiles[y][ox + x] = 1; break; // ground
          case 'p': tiles[y][ox + x] = 2; break; // platform
          case 'c': tiles[y][ox + x] = 3; break; // collectible
          case 'x': tiles[y][ox + x] = 4; break; // obstacle
          case 'f': tiles[y][ox + x] = 5; break; // flag
          case 'h': tiles[y][ox + x] = 7; break; // heart (extra life)
          default: tiles[y][ox + x] = 0; break;  // empty
        }
      }
    }
  }

  // Remove hearts that were already collected in this run
  for (let y = 0; y < levelHeight; y++) {
    for (let x = 0; x < levelWidth; x++) {
      if (tiles[y][x] === 7 && collectedHearts.has(levelIdx + '_' + x + '_' + y)) {
        tiles[y][x] = 0;
      }
    }
  }

  return { tiles, width: levelWidth, height: levelHeight };
}

let camera = { x: 0, y: 0 };

function updateCamera() {
  // Camera leads ahead of the player for auto-runner visibility
  const targetX = player.x - GAME_W / 4;
  const targetY = player.y - GAME_H / 2;
  camera.x += (targetX - camera.x) * 0.1;
  camera.y += (targetY - camera.y) * 0.1;
  camera.x = Math.max(0, Math.min(camera.x, currentLevelData.width * TILE_SIZE - GAME_W));
  camera.y = Math.max(0, Math.min(camera.y, currentLevelData.height * TILE_SIZE - GAME_H));
}

function drawVinylLP(x, y, size) {
  const s = size;
  const cx = x + s/2;
  const cy = y + s/2;
  // Outer edge — bright so it's visible
  ctx.fillStyle = '#555';
  ctx.beginPath(); ctx.arc(cx, cy, s/2, 0, Math.PI * 2); ctx.fill();
  // Main disc — dark but visible
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(cx, cy, s/2 - 1, 0, Math.PI * 2); ctx.fill();
  // Grooves — visible rings
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1;
  for (let r = 4; r < s/2 - 3; r += 3) {
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
  }
  // Shine — light reflection arc
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx - 1, cy - 1, s/3, -0.8, 0.3); ctx.stroke();
  // Label — coloured center
  ctx.fillStyle = BRAND.accent;
  ctx.beginPath(); ctx.arc(cx, cy, s/4, 0, Math.PI * 2); ctx.fill();
  // Label detail
  ctx.fillStyle = '#d44a7a';
  ctx.beginPath(); ctx.arc(cx, cy, s/6, 0, Math.PI * 2); ctx.fill();
  // Center hole
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx, cy, 2, 0, Math.PI * 2); ctx.fill();
}

function drawGoldRecord(x, y, size) {
  const s = size;
  ctx.fillStyle = BRAND.gold;
  ctx.beginPath(); ctx.arc(x + s/2, y + s/2, s/2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#c8a200';
  ctx.beginPath(); ctx.arc(x + s/2, y + s/2, s/3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = BRAND.gold;
  ctx.beginPath(); ctx.arc(x + s/2, y + s/2, s/5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(x + s/2, y + s/2, 2, 0, Math.PI * 2); ctx.fill();
}

function drawPlayButton(x, y, size) {
  const s = size;
  // Circle
  ctx.fillStyle = BRAND.red;
  ctx.beginPath(); ctx.arc(x + s/2, y + s/2, s/2, 0, Math.PI * 2); ctx.fill();
  // Triangle
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(x + s * 0.35, y + s * 0.25);
  ctx.lineTo(x + s * 0.75, y + s * 0.5);
  ctx.lineTo(x + s * 0.35, y + s * 0.75);
  ctx.closePath();
  ctx.fill();
}

function drawBackstagePass(x, y, size) {
  const s = size;
  ctx.fillStyle = BRAND.cyan;
  ctx.fillRect(x + 2, y, s - 4, s);
  ctx.fillStyle = '#fff';
  ctx.fillRect(x + 4, y + 2, s - 8, s * 0.3);
  ctx.fillStyle = BRAND.dark;
  ctx.fillRect(x + 6, y + s * 0.45, s - 12, 2);
  ctx.fillRect(x + 6, y + s * 0.55, s - 12, 2);
  ctx.fillRect(x + 6, y + s * 0.65, s * 0.4, 2);
  // Lanyard hole
  ctx.fillStyle = '#888';
  ctx.beginPath(); ctx.arc(x + s/2, y + s - 4, 3, 0, Math.PI * 2); ctx.fill();
}

    "..OGLLLLLLLLLLLGGO....",
    ".OGLLDDDDDDDDDLLGGO...",
    ".OGLDDHHHHHHHHDDLGGO..",
    ".OGLLDDDDDDDDDDLLGGO..",
    ".OGLLLLLLLLLLLLLLGGO..",
    "..OGGGGGGGGGGGGGGO...."
  ];

  const gold = '#FDCB6E';

  const palette = {
    O: '#000000',
    G: gold,
    L: '#ffe680',
    D: '#d89a17',
    H: '#8b6914'
  };

  const rows = sprite.length;
  const cols = sprite[0].length;

  const px = Math.max(1, Math.floor(Math.min(s / cols, s / rows)));
  const drawW = cols * px;
  const drawH = rows * px;

  const ox = Math.round(x + (s - drawW) / 2);
  const oy = Math.round(y + (s - drawH) / 2);

  const prevSmoothing = ctx.imageSmoothingEnabled;
  ctx.imageSmoothingEnabled = false;

  for (let row = 0; row < rows; row++) {
    const line = sprite[row];
    for (let col = 0; col < cols; col++) {
      const ch = line[col];
      if (ch === '.') continue;

      ctx.fillStyle = palette[ch];
      ctx.fillRect(ox + col * px, oy + row * px, px, px);
    }
  }

  ctx.imageSmoothingEnabled = prevSmoothing;
}

function drawObstacle(x, y, size, levelIdx) {
  const s = size;
  switch (levelIdx) {
    case 0: // Broken guitar strings — spiky
      ctx.fillStyle = '#888';
      ctx.fillRect(x + s/2 - 2, y, 4, s);
      ctx.fillStyle = BRAND.red;
      // Spikes
      for (let i = 0; i < 3; i++) {
        const sy = y + i * s/3;
        ctx.beginPath();
        ctx.moveTo(x, sy + s/6);
        ctx.lineTo(x + s/2, sy);
        ctx.lineTo(x + s/2, sy + s/3);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(x + s, sy + s/6);
        ctx.lineTo(x + s/2, sy);
        ctx.lineTo(x + s/2, sy + s/3);
        ctx.closePath();
        ctx.fill();
      }
      break;
    case 1: // Rejected demo boxes
      ctx.fillStyle = '#8B7355';
      ctx.fillRect(x + 2, y + s * 0.3, s - 4, s * 0.7);
      ctx.fillStyle = '#A08060';
      ctx.fillRect(x + 4, y + s * 0.35, s - 8, s * 0.3);
      ctx.fillStyle = BRAND.red;
      // X mark
      ctx.lineWidth = 3;
      ctx.strokeStyle = BRAND.red;
      ctx.beginPath();
      ctx.moveTo(x + 8, y + s * 0.4);
      ctx.lineTo(x + s - 8, y + s * 0.6);
      ctx.moveTo(x + s - 8, y + s * 0.4);
      ctx.lineTo(x + 8, y + s * 0.6);
      ctx.stroke();
      break;
    case 2: // Bad review newspapers
      ctx.fillStyle = '#F5F0E1';
      ctx.fillRect(x + 4, y + 4, s - 8, s - 4);
      ctx.fillStyle = '#333';
      ctx.fillRect(x + 6, y + 8, s - 12, 3);
      ctx.fillRect(x + 6, y + 14, s * 0.5, 2);
      ctx.fillRect(x + 6, y + 18, s * 0.6, 2);
      // Thumbs down
      ctx.fillStyle = BRAND.red;
      ctx.fillRect(x + s/2 - 4, y + s * 0.6, 8, 8);
      ctx.fillRect(x + s/2 - 2, y + s * 0.5, 4, 6);
      break;
    case 3: // Potholes
      ctx.fillStyle = '#2a2a2a';
      ctx.beginPath();
      ctx.ellipse(x + s/2, y + s * 0.7, s/2, s * 0.25, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath();
      ctx.ellipse(x + s/2, y + s * 0.75, s/3, s * 0.15, 0, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 4: // Copyright strikes — lightning bolts
      ctx.fillStyle = BRAND.gold;
      ctx.beginPath();
      ctx.moveTo(x + s * 0.55, y);
      ctx.lineTo(x + s * 0.3, y + s * 0.45);
      ctx.lineTo(x + s * 0.5, y + s * 0.45);
      ctx.lineTo(x + s * 0.4, y + s);
      ctx.lineTo(x + s * 0.7, y + s * 0.5);
      ctx.lineTo(x + s * 0.5, y + s * 0.5);
      ctx.closePath();
      ctx.fill();
      break;
  }
}

// ============================================================
// FLAG / END MARKER
// ============================================================
function drawFlag(x, y) {
  // Pole
  ctx.fillStyle = '#DFE6E9';
  ctx.fillRect(x + 12, y - 64, 4, 96);
  // Flag
  ctx.fillStyle = BRAND.accent;
  ctx.beginPath();
  ctx.moveTo(x + 16, y - 64);
  ctx.lineTo(x + 44, y - 48);
  ctx.lineTo(x + 16, y - 32);
  ctx.closePath();
  ctx.fill();
  // Star on flag
  ctx.fillStyle = BRAND.gold;
  ctx.beginPath();
  ctx.arc(x + 26, y - 48, 4, 0, Math.PI * 2);
  ctx.fill();
  // Base
  ctx.fillStyle = '#636e72';
  ctx.fillRect(x + 6, y + 28, 20, 4);
}

// ============================================================
// PARALLAX BACKGROUNDS
// ============================================================
function drawBackground(theme, camX) {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, GAME_H);
  grad.addColorStop(0, theme.bg3);
  grad.addColorStop(1, theme.bg1);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  for (let i = 0; i < 50; i++) {
    const sx = ((i * 137 + 50) % GAME_W + GAME_W - camX * 0.02 % GAME_W) % GAME_W;
    const sy = (i * 73 + 20) % (GAME_H * 0.5);
    ctx.fillRect(sx, sy, 2, 2);
  }

  // Back mountains (layer 1 — slowest)
  ctx.fillStyle = theme.bg2;
  for (let i = 0; i < 10; i++) {
    const bx = i * 160 - (camX * 0.1) % 160;
    const bh = 80 + (i * 47) % 60;
    ctx.beginPath();
    ctx.moveTo(bx, GAME_H);
    ctx.lineTo(bx + 80, GAME_H - bh);
    ctx.lineTo(bx + 160, GAME_H);
    ctx.closePath();
    ctx.fill();
  }

  // Mid buildings (layer 2)
  ctx.fillStyle = theme.bg1;
  for (let i = 0; i < 15; i++) {
    const bx = i * 100 - (camX * 0.25) % 100;
    const bh = 40 + (i * 31) % 80;
    ctx.fillRect(bx, GAME_H - bh, 60, bh);
    // Windows
    ctx.fillStyle = 'rgba(255,255,200,0.15)';
    for (let wy = GAME_H - bh + 8; wy < GAME_H - 8; wy += 14) {
      for (let wx = bx + 8; wx < bx + 52; wx += 16) {
        ctx.fillRect(wx, wy, 8, 8);
      }
    }
    ctx.fillStyle = theme.bg1;
  }
}

// ============================================================
// DRAW CHARACTER
// ============================================================
function drawCharacter(charKey, x, y, state, scale = 3, facing = 1) {
  const ch = CHAR_SPRITES[charKey];
  if (!ch) return;
  colorMap['s'] = ch.skin;
  let sprite;
  if (state === 'jump') sprite = ch.jump;
  else if (state === 'run') sprite = ch.run1;
  else sprite = ch.idle;

  drawPixelArt(sprite, x, y, scale, facing < 0);
}

// ============================================================
// SOCIAL SHARE ICONS (Pixel Art Style)
// ============================================================
function drawPixelSocialIcon(type, x, y, size) {
  const s = size;
  const p = Math.max(1, Math.floor(s / 16)); // pixel unit

  // Background circle/square
  const colors = {
    twitter: '#1DA1F2', facebook: '#4267B2', linkedin: '#0077B5',
    whatsapp: '#25D366', reddit: '#FF4500', email: '#888888', copy: BRAND.primary,
  };
  ctx.fillStyle = colors[type] || '#888';
  // Rounded square
  ctx.fillRect(x + p, y, s - p*2, s);
  ctx.fillRect(x, y + p, s, s - p*2);

  // Icon in white pixels
  ctx.fillStyle = '#fff';
  const cx = x + s/2;
  const cy = y + s/2;

  switch(type) {
    case 'twitter': // X logo
      ctx.fillRect(cx - 5*p, cy - 5*p, 2*p, 2*p);
      ctx.fillRect(cx + 3*p, cy - 5*p, 2*p, 2*p);
      ctx.fillRect(cx - 3*p, cy - 3*p, 2*p, 2*p);
      ctx.fillRect(cx + 1*p, cy - 3*p, 2*p, 2*p);
      ctx.fillRect(cx - 1*p, cy - 1*p, 2*p, 2*p);
      ctx.fillRect(cx - 3*p, cy + 1*p, 2*p, 2*p);
      ctx.fillRect(cx + 1*p, cy + 1*p, 2*p, 2*p);
      ctx.fillRect(cx - 5*p, cy + 3*p, 2*p, 2*p);
      ctx.fillRect(cx + 3*p, cy + 3*p, 2*p, 2*p);
      break;
    case 'facebook': // F
      ctx.fillRect(cx - 1*p, cy - 5*p, 4*p, 2*p);
      ctx.fillRect(cx - 1*p, cy - 5*p, 2*p, 10*p);
      ctx.fillRect(cx - 3*p, cy - 1*p, 6*p, 2*p);
      break;
    case 'linkedin': // in
      ctx.fillRect(cx - 5*p, cy - 5*p, 2*p, 2*p);
      ctx.fillRect(cx - 5*p, cy - 1*p, 2*p, 6*p);
      ctx.fillRect(cx - 1*p, cy - 1*p, 2*p, 6*p);
      ctx.fillRect(cx - 1*p, cy - 1*p, 4*p, 2*p);
      ctx.fillRect(cx + 3*p, cy + 1*p, 2*p, 4*p);
      break;
    case 'whatsapp': // Phone
      ctx.fillRect(cx - 3*p, cy - 5*p, 6*p, 2*p);
      ctx.fillRect(cx - 5*p, cy - 3*p, 2*p, 6*p);
      ctx.fillRect(cx + 3*p, cy - 3*p, 2*p, 6*p);
      ctx.fillRect(cx - 3*p, cy + 3*p, 6*p, 2*p);
      ctx.fillRect(cx - 1*p, cy - 1*p, 4*p, 2*p);
      ctx.fillRect(cx + 1*p, cy - 1*p, 2*p, 4*p);
      break;
    case 'reddit': // Robot face
      ctx.fillRect(cx - 5*p, cy - 3*p, 10*p, 2*p);
      ctx.fillRect(cx - 5*p, cy - 1*p, 2*p, 4*p);
      ctx.fillRect(cx + 3*p, cy - 1*p, 2*p, 4*p);
      ctx.fillRect(cx - 5*p, cy + 3*p, 10*p, 2*p);
      ctx.fillRect(cx - 3*p, cy - 1*p, 2*p, 2*p);
      ctx.fillRect(cx + 1*p, cy - 1*p, 2*p, 2*p);
      ctx.fillRect(cx - 1*p, cy - 5*p, 2*p, 2*p);
      break;
    case 'email': // Envelope
      ctx.fillRect(cx - 5*p, cy - 3*p, 10*p, 2*p);
      ctx.fillRect(cx - 5*p, cy + 3*p, 10*p, 2*p);
      ctx.fillRect(cx - 5*p, cy - 1*p, 2*p, 4*p);
      ctx.fillRect(cx + 3*p, cy - 1*p, 2*p, 4*p);
      ctx.fillRect(cx - 3*p, cy - 1*p, 2*p, 2*p);
      ctx.fillRect(cx + 1*p, cy - 1*p, 2*p, 2*p);
      ctx.fillRect(cx - 1*p, cy + 1*p, 2*p, 2*p);
      break;
    case 'copy': // Clipboard
      ctx.fillRect(cx - 3*p, cy - 5*p, 6*p, 2*p);
      ctx.fillRect(cx - 5*p, cy - 3*p, 2*p, 8*p);
      ctx.fillRect(cx + 3*p, cy - 3*p, 2*p, 8*p);
      ctx.fillRect(cx - 3*p, cy + 3*p, 6*p, 2*p);
      ctx.fillRect(cx - 1*p, cy - 1*p, 4*p, 2*p);
      ctx.fillRect(cx - 1*p, cy + 1*p, 2*p, 2*p);
      break;
  }
}

function drawShareButtons(yStart, scoreText) {
  const platforms = MENU_SOCIAL_PLATFORMS;
  const labels = ['X', 'FB', 'IN', 'WA', 'RD', 'EM', 'CP'];
  const iconSize = 40;
  const gap = 12;
  const totalW = platforms.length * (iconSize + gap) - gap;
  const startX = GAME_W / 2 - totalW / 2;

  const shareSelected = menuSelection >= 2;
  drawPixelText('SHARE YOUR SCORE', GAME_W / 2, yStart, 2, shareSelected ? BRAND.gold : '#8a7030', true);

  for (let i = 0; i < platforms.length; i++) {
    const ix = startX + i * (iconSize + gap);
    const iy = yStart + 20;
    const isHighlighted = menuSelection === 2 + i;

    if (isHighlighted) {
      // Glowing highlight box
      ctx.fillStyle = 'rgba(253,121,168,0.3)';

      ctx.strokeStyle = BRAND.accent;
      ctx.lineWidth = 2;
      ctx.strokeRect(ix - 4, iy - 4, iconSize + 8, iconSize + 8);
    }

    drawPixelSocialIcon(platforms[i], ix, iy, iconSize);
    drawPixelText(labels[i], ix + iconSize / 2, iy + iconSize + 4, 1, isHighlighted ? BRAND.accent : BRAND.light, true);

function shareTo(platform, scoreText) {
  const msg = `I just scored ${score} on TEAM RUN! Can you beat my score? Play the hidden game at teamrollouts.com/teamrun`;
  const url = 'https://teamrollouts.com';
  const encoded = encodeURIComponent(msg);
  const encodedUrl = encodeURIComponent(url);

  let shareUrl = '';
  switch(platform) {
    case 'twitter':
      shareUrl = `https://twitter.com/intent/tweet?text=${encoded}`;
      break;
    case 'facebook':
      shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}&quote=${encoded}`;
      break;
    case 'linkedin':
      shareUrl = `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`;
      break;
    case 'whatsapp':
      shareUrl = `https://wa.me/?text=${encoded}`;
      break;
    case 'reddit':
      shareUrl = `https://reddit.com/submit?url=${encodedUrl}&title=${encodeURIComponent('TEAM RUN - Music Release Platformer')}`;
      break;
    case 'email':
      shareUrl = `mailto:?subject=${encodeURIComponent('Can you beat my TEAM RUN score?')}&body=${encoded}`;
      break;
    case 'copy':
      navigator.clipboard.writeText(msg).catch(() => {});
      return;
  }
  if (shareUrl) window.open(shareUrl, '_blank');
}

  const w = 200 * scale;

// ============================================================
// STATE: CHARACTER SELECT
// ============================================================
let charSelectAnim = 0;

function updateCharSelect(dt) {
  stateTimer += dt;
  charSelectAnim += dt;

  if (wasJustPressed('ArrowRight') || wasJustPressed('KeyD')) {
    selectedChar = (selectedChar + 1) % charKeys.length;
    sfxMenuSelect();
  }
  if (wasJustPressed('ArrowLeft') || wasJustPressed('KeyA')) {
    selectedChar = (selectedChar - 1 + charKeys.length) % charKeys.length;
    sfxMenuSelect();
  }
  if (wasJustPressed('Space') || wasJustPressed('Enter')) {
    sfxMenuSelect();
    gameState = STATE.INSTRUCTIONS;
    stateTimer = 0;
    countdownNum = 3;
    score = 0;
    lives = charKeys[selectedChar] === 'ceo' ? 5 : 3;
    deathCount = 0;
    totalCollected = 0;
    collectedHearts = new Set();
    currentLevel = 0;
    startLevel(0);
  }

  // Level skip backdoor — press a number 1-5 five times to jump to that level
  skipTimer += dt;
  if (skipTimer > 2) { skipKey = null; skipCount = 0; }
  for (let lvl = 1; lvl <= 5; lvl++) {
    if (wasJustPressed('Digit' + lvl)) {
      if (skipKey === lvl) { skipCount++; skipTimer = 0; }
      else { skipKey = lvl; skipCount = 1; skipTimer = 0; }
      if (skipCount >= 5) {
        sfxMenuSelect();
        skipCount = 0;
        skipKey = null;
        gameState = STATE.COUNTDOWN;
        stateTimer = 0;
        countdownNum = 3;
        score = 0;
        lives = charKeys[selectedChar] === 'ceo' ? 5 : 3;
        deathCount = 0;
        totalCollected = 0;
        collectedHearts = new Set();
        currentLevel = lvl - 1;
        startLevel(lvl - 1);
      }
    }
  }
}

function drawCharSelect() {
  ctx.fillStyle = BRAND.dark;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  drawPixelText('CHOOSE YOUR CHARACTER', GAME_W / 2, 30, 3, BRAND.primary, true);

  // Infinite loop carousel — no boxes, just characters
  const centerX = GAME_W / 2;
  const centerY = GAME_H / 2 - 10;
  const spacing = 160;
  const numChars = charKeys.length;

  // Draw positions -3 to +3 for infinite wrapping
  for (let pos = -3; pos <= 3; pos++) {
    // Wrap index for infinite loop
    const idx = ((selectedChar + pos) % numChars + numChars) % numChars;
    const cx = centerX + pos * spacing;
    const isSelected = pos === 0;

    // Skip if off screen
    if (cx < -80 || cx > GAME_W + 80) continue;

    // Scale and fade based on distance from center
    const dist = Math.abs(pos);
    const alpha = isSelected ? 1 : Math.max(0.15, 0.5 - dist * 0.15);
    const sprScale = isSelected ? 5 : Math.max(2, 3.5 - dist * 0.5);
    const yOffset = isSelected ? 0 : 20 + dist * 5;

    ctx.globalAlpha = alpha;

    const ch_key = charKeys[idx];
    const sprChar = CHAR_SPRITES[ch_key];

    // Animation — selected bounces and animates, others are static
    const animState = isSelected ? (Math.floor(charSelectAnim * 3) % 2 === 0 ? 'idle' : 'run') : 'idle';
    const bounceY = isSelected ? Math.sin(charSelectAnim * 4) * 6 : 0;

    const sprW = 12 * sprScale;
    const sprH = 12 * sprScale;
    const charY = centerY - sprH / 2 + yOffset + bounceY;

    drawCharacter(ch_key, cx - sprW / 2, charY, animState, sprScale);

    // Name and tagline below character
    const textY = centerY + sprH / 2 + yOffset + bounceY + 20;
    const nameScale = isSelected ? 2.5 : 1.5;
    const tagScale = isSelected ? 1.5 : 1;
    const nameColor = isSelected ? BRAND.white : BRAND.light;
    const tagColor = isSelected ? BRAND.secondary : BRAND.light;

    drawPixelText(sprChar.name, cx, textY, nameScale, nameColor, true);
    drawPixelText(sprChar.tagline, cx, textY + nameScale * 7 + 4, tagScale, tagColor, true);

    ctx.globalAlpha = 1;
  }

  // Selection indicator — subtle glow under selected character
  ctx.globalAlpha = 0.15 + Math.sin(charSelectAnim * 3) * 0.05;
  ctx.fillStyle = BRAND.primary;
  ctx.beginPath();
  ctx.ellipse(centerX, centerY + 80, 60, 10, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Arrows (always visible — infinite loop)
  const arrowBlink = Math.sin(stateTimer * 4) > 0;
  const arrowAlpha = arrowBlink ? 1 : 0.4;
  ctx.globalAlpha = arrowAlpha;
  drawPixelText('<', 30, centerY - 10, 4, BRAND.accent, true);
  drawPixelText('>', GAME_W - 30, centerY - 10, 4, BRAND.accent, true);
  ctx.globalAlpha = 1;

  // Special ability note for selected character
  const selKey = charKeys[selectedChar];
  if (selKey === 'dj') {
    drawPixelText('SPECIAL: DOUBLE JUMP!', GAME_W / 2, GAME_H - 55, 1.5, BRAND.gold, true);
  } else if (selKey === 'producer') {
    drawPixelText('SPECIAL: HIGH JUMP!', GAME_W / 2, GAME_H - 55, 1.5, BRAND.gold, true);
  } else if (selKey === 'ar') {
    drawPixelText('SPECIAL: EXTRA SPEED!', GAME_W / 2, GAME_H - 55, 1.5, BRAND.gold, true);
  } else if (selKey === 'intern') {
    drawPixelText('HARD MODE: FASTEST SPEED!', GAME_W / 2, GAME_H - 55, 1.5, BRAND.red, true);
  } else if (selKey === 'ceo') {
    drawPixelText('EASY MODE: FULL CONTROL + 5 LIVES', GAME_W / 2, GAME_H - 55, 1.5, BRAND.gold, true);
  }

  // Instructions
  drawPixelText('ARROWS TO SELECT  -  SPACE TO CONFIRM', GAME_W / 2, GAME_H - 30, 1.5, BRAND.light, true);
}

// ============================================================
// STATE: COUNTDOWN
// ============================================================
function updateCountdown(dt) {
  stateTimer += dt;

  if (stateTimer > 1 && countdownNum > 0) {
    countdownNum--;
    stateTimer = 0;
    if (countdownNum > 0) sfxCountdown();
    else sfxGo();
  }
  if (countdownNum === 0 && stateTimer > 0.5) {
    gameState = STATE.PLAYING;
    stateTimer = 0;
    levelTime = 0;
  }
}

function drawCountdown() {
  ctx.fillStyle = BRAND.dark;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  const theme = LEVEL_THEMES[currentLevel];

  // Level name
  drawPixelText('LEVEL ' + (currentLevel + 1), GAME_W / 2, 120, 3, BRAND.secondary, true);
  drawPixelText(theme.name, GAME_W / 2, 160, 5, BRAND.white, true);
  drawPixelText(theme.subtitle, GAME_W / 2, 210, 2, BRAND.accent, true);

  // Countdown number
  const text = countdownNum > 0 ? countdownNum.toString() : 'GO!';
  const scale = countdownNum > 0 ? 12 : 8;
  const color = countdownNum > 0 ? BRAND.white : BRAND.green;

  // Pulse effect
  const pulse = 1 + Math.sin(stateTimer * 10) * 0.1;
  const s = scale * pulse;

  drawPixelText(text, GAME_W / 2, GAME_H / 2 + 20, s, color, true);

  // Promo text
  if (charKeys[selectedChar] === 'ceo') {
    drawPixelText('LABEL OWNER MODE: FULL CONTROL + EXTRA JUMP HEIGHT', GAME_W / 2, GAME_H - 40, 1.5, BRAND.gold, true);
  } else {
    drawPixelText('HEAD OVER TO TEAMROLLOUTS.COM TO MANAGE YOUR NEXT RELEASE!', GAME_W / 2, GAME_H - 40, 1.3, BRAND.light, true);
  }
}

// ============================================================
// START LEVEL
// ============================================================
function startLevel(idx) {
  currentLevel = idx;
  currentLevelData = generateLevel(idx);
  resetPlayer();
  camera.x = 0;
  camera.y = 0;
  scoreAtLevelStart = score;
  collectedAtLevelStart = totalCollected;
  levelScore = 0;
  levelTime = 0;
  particles = [];
  player.canDoubleJump = charKeys[selectedChar] === 'dj';
}

// ============================================================
// STATE: PLAYING
// ============================================================
function updatePlaying(dt) {
  if (player.isDead) {
    player.deathTimer += dt;
    if (player.deathTimer > 1.5) {
      lives--;
      if (lives <= 0) {
        gameState = STATE.GAME_OVER;
        stateTimer = 0;
        menuSelection = 0;
        gameOverQuip = GAME_OVER_QUIPS[Math.floor(Math.random() * GAME_OVER_QUIPS.length)];
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('teamrun_highscore', highScore.toString());
        }
      } else {
        // Reset score to what it was at level start and regenerate level
        score = scoreAtLevelStart;
        totalCollected = collectedAtLevelStart;
        currentLevelData = generateLevel(currentLevel);
        resetPlayer();
        camera.x = 0;
        camera.y = 0;
        levelScore = 0;
        levelTime = 0;
        particles = [];
      }
    }
    updateParticles();
    return;
  }

  levelTime += dt;

  // Invincibility frames
  if (player.invincible > 0) player.invincible -= dt;

  // Movement
  const charKey = charKeys[selectedChar];
  const isCEO = charKey === 'ceo';

  if (isCEO) {
    // CEO: manual left/right control (not auto-run)
    const speed = 4;
    if (isKeyPressed('ArrowRight') || isKeyPressed('KeyD')) {
      player.vx = speed;
      player.facing = 1;
    } else if (isKeyPressed('ArrowLeft') || isKeyPressed('KeyA')) {
      player.vx = -speed;
      player.facing = -1;
    } else {
      player.vx *= 0.7;
    }
  } else {
    // Everyone else: auto-run
    const speed = charKey === 'producer' ? 3.5 : charKey === 'manager' ? 4 : charKey === 'ar' ? 5 : charKey === 'intern' ? 6 : charKey === 'dj' ? 4 : 4;
    player.vx = speed;
    player.facing = 1;
  }

  // Jump (spacebar, up arrow, or W)
  // CEO gets double jump height + double jump ability
  const jumpPower = isCEO ? -16 : charKey === 'producer' ? -13 : -11;
  if (wasJustPressed('Space') || wasJustPressed('ArrowUp') || wasJustPressed('KeyW')) {
    if (player.onGround) {
      player.vy = jumpPower;
      player.onGround = false;
      player.hasDoubleJumped = false;
      sfxJump();
    } else if ((player.canDoubleJump || isCEO) && !player.hasDoubleJumped) {
      player.vy = jumpPower * 0.85;
      player.hasDoubleJumped = true;
      sfxJump();
      spawnParticles(player.x + player.w/2, player.y + player.h, BRAND.accent, 5);
    }
  }

  // Gravity
  player.vy += 0.6;
  if (player.vy > 12) player.vy = 12;

  // Move X
  player.x += player.vx;
  // Clamp to level bounds
  if (player.x < 0) player.x = 0;
  if (player.x + player.w > currentLevelData.width * TILE_SIZE) player.x = currentLevelData.width * TILE_SIZE - player.w;

  // Collide X
  resolveCollisionX();

  // Move Y
  player.y += player.vy;

  // Collide Y
  player.onGround = false;
  resolveCollisionY();

  // Fall into pit
  if (player.y > currentLevelData.height * TILE_SIZE + 50) {
    killPlayer();
  }

  // Scrolled off left edge of screen — death
  if (player.x + player.w < camera.x) {
    killPlayer();
  }

  // Check collectibles
  checkCollectibles();

  // Check obstacles
  checkObstacles();

  // Check flag
  checkFlag();

  // Update camera
  updateCamera();

  // Animate
  player.animTimer += dt;
  if (player.animTimer > 0.15) {
    player.animTimer = 0;
    player.animFrame = (player.animFrame + 1) % 2;
  }

  updateParticles();
  updateShake();

  // Pause
  if (wasJustPressed('Escape') || wasJustPressed('KeyP')) {
    gameState = STATE.PAUSED;
  }

  // Mute toggle
  if (wasJustPressed('KeyM')) audioEnabled = !audioEnabled;
}

function getTile(tx, ty) {
  if (tx < 0 || ty < 0 || tx >= currentLevelData.width || ty >= currentLevelData.height) return 0;
  return currentLevelData.tiles[ty][tx];
}

function isSolid(tx, ty) {
  const t = getTile(tx, ty);
  return t === 1 || t === 2;
}

function resolveCollisionX() {
  const left = Math.floor(player.x / TILE_SIZE);
  const right = Math.floor((player.x + player.w) / TILE_SIZE);
  const top = Math.floor(player.y / TILE_SIZE);
  const bot = Math.floor((player.y + player.h - 1) / TILE_SIZE);

  for (let ty = top; ty <= bot; ty++) {
    for (let tx = left; tx <= right; tx++) {
      if (isSolid(tx, ty)) {
        const tileLeft = tx * TILE_SIZE;
        const tileRight = tileLeft + TILE_SIZE;
        if (player.vx > 0) {
          player.x = tileLeft - player.w - 0.1;
        } else if (player.vx < 0) {
          player.x = tileRight + 0.1;
        }
        player.vx = 0;
      }
    }
  }
}

function resolveCollisionY() {
  const left = Math.floor(player.x / TILE_SIZE);
  const right = Math.floor((player.x + player.w - 1) / TILE_SIZE);
  const top = Math.floor(player.y / TILE_SIZE);
  const bot = Math.floor((player.y + player.h) / TILE_SIZE);

  for (let ty = top; ty <= bot; ty++) {
    for (let tx = left; tx <= right; tx++) {
      if (isSolid(tx, ty)) {
        const tileTop = ty * TILE_SIZE;
        const tileBot = tileTop + TILE_SIZE;
        if (player.vy > 0) {
          player.y = tileTop - player.h;
          player.vy = 0;
          player.onGround = true;
        } else if (player.vy < 0) {
          player.y = tileBot;
          player.vy = 0;
        }
      }
    }
  }
}

function checkCollectibles() {
  const px = player.x + player.w / 2;
  const py = player.y + player.h / 2;
  const tx = Math.floor(px / TILE_SIZE);
  const ty = Math.floor(py / TILE_SIZE);

  for (let dy = -1; dy <= 1; dy++) {
    for (let dx = -1; dx <= 1; dx++) {
      const cx = tx + dx;
      const cy = ty + dy;
      const tileVal = getTile(cx, cy);
      if (tileVal === 3 || tileVal === 7) {
        // Check actual proximity
        const tileCX = cx * TILE_SIZE + TILE_SIZE / 2;
        const tileCY = cy * TILE_SIZE + TILE_SIZE / 2;
        const dist = Math.hypot(px - tileCX, py - tileCY);
        if (dist < TILE_SIZE) {
          currentLevelData.tiles[cy][cx] = 0;
          if (tileVal === 7) {
            // Heart — extra life, permanently collected
            lives++;
            collectedHearts.add(currentLevel + '_' + cx + '_' + cy);
            sfxLevelComplete();
            spawnParticles(tileCX, tileCY, BRAND.accent, 12);
            spawnParticles(tileCX, tileCY, '#ff9fc4', 8);
          } else {
            // Regular collectible
            const pts = COLLECT_SCORES[currentLevel];
            score += pts;
            levelScore += pts;
            totalCollected++;
            sfxCollect();
            spawnParticles(tileCX, tileCY, BRAND.gold, 6);
            spawnParticles(tileCX, tileCY, BRAND.primary, 4);
          }
        }
      }
    }
  }
}

function checkObstacles() {
  if (player.invincible > 0) return;
  const px = player.x + player.w / 2;
  const py = player.y + player.h / 2;
  const tx = Math.floor(px / TILE_SIZE);
  const ty = Math.floor(py / TILE_SIZE);

  for (let dy = -1; dy <= 1; dy++) {
    for (let dx = -1; dx <= 1; dx++) {
      const cx = tx + dx;
      const cy = ty + dy;
      if (getTile(cx, cy) === 4) {
        const tileCX = cx * TILE_SIZE + TILE_SIZE / 2;
        const tileCY = cy * TILE_SIZE + TILE_SIZE / 2;
        const dist = Math.hypot(px - tileCX, py - tileCY);
        if (dist < TILE_SIZE * 0.7) {
          killPlayer();
          return;
        }
      }
    }
  }
}

function checkFlag() {
  // Find the flag position and trigger level complete when player reaches or passes it
  if (!currentLevelData._flagX) {
    // Cache flag position on first call
    for (let y = 0; y < currentLevelData.height; y++) {
      for (let x = 0; x < currentLevelData.width; x++) {
        if (currentLevelData.tiles[y][x] === 5) {
          currentLevelData._flagX = x * TILE_SIZE;
          break;
        }
      }
      if (currentLevelData._flagX) break;
    }
  }
  if (currentLevelData._flagX && player.x + player.w >= currentLevelData._flagX) {
    const timeBonus = Math.max(0, Math.floor((120 - levelTime) * 10));
    score += timeBonus;
    sfxLevelComplete();
    gameState = STATE.LEVEL_COMPLETE;
    stateTimer = 0;
  }
}

function killPlayer() {
  if (player.isDead) return;
  player.isDead = true;
  player.deathTimer = 0;
  player.vy = -8;
  deathCount++;
  sfxDeath();
  triggerShake(12);
  spawnParticles(player.x + player.w/2, player.y + player.h/2, BRAND.red, 15);
}

function drawPlaying() {
  ctx.save();
  ctx.translate(shakeX, shakeY);

  const theme = LEVEL_THEMES[currentLevel];
  drawBackground(theme, camera.x);

  ctx.save();
  ctx.translate(-Math.floor(camera.x), -Math.floor(camera.y));

  // Draw tiles
  const startTX = Math.max(0, Math.floor(camera.x / TILE_SIZE) - 1);
  const endTX = Math.min(currentLevelData.width, Math.ceil((camera.x + GAME_W) / TILE_SIZE) + 1);
  const startTY = Math.max(0, Math.floor(camera.y / TILE_SIZE) - 1);
  const endTY = Math.min(currentLevelData.height, Math.ceil((camera.y + GAME_H) / TILE_SIZE) + 1);

  for (let ty = startTY; ty < endTY; ty++) {
    for (let tx = startTX; tx < endTX; tx++) {
      const tile = currentLevelData.tiles[ty][tx];
      const x = tx * TILE_SIZE;
      const y = ty * TILE_SIZE;

      if (tile === 1) {
        // Ground
        ctx.fillStyle = theme.groundColor;
        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
        // Top edge highlight
        if (ty === 0 || !isSolid(tx, ty - 1)) {
          ctx.fillStyle = theme.platformColor;
          ctx.fillRect(x, y, TILE_SIZE, 4);
        }
        // Texture
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        if ((tx + ty) % 2 === 0) ctx.fillRect(x + 4, y + 8, 8, 4);
      } else if (tile === 2) {
        // Platform
        ctx.fillStyle = theme.platformColor;
        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.fillRect(x, y, TILE_SIZE, 4);
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.fillRect(x, y + TILE_SIZE - 4, TILE_SIZE, 4);
      } else if (tile === 3) {
        // Collectible
        const bobY = Math.sin(stateTimer * 3 + tx * 0.5) * 4;
        collectDrawFuncs[currentLevel](x + 4, y + 4 + bobY, TILE_SIZE - 8);
      } else if (tile === 4) {
        // Obstacle
        drawObstacle(x, y, TILE_SIZE, currentLevel);
      } else if (tile === 5) {
        drawFlag(x, y);
      } else if (tile === 7) {
        // Heart pickup — extra life
        const bobY = Math.sin(stateTimer * 4 + tx) * 5;
        const hs = TILE_SIZE - 8;
        const hx = x + 4;
        const hy = y + 4 + bobY;
        // Glow
        ctx.fillStyle = 'rgba(253,121,168,0.25)';
        ctx.beginPath();
        ctx.arc(hx + hs/2, hy + hs/2, hs * 0.8, 0, Math.PI * 2);
        ctx.fill();
        // Pixel heart
        const p = Math.floor(hs / 8);
        ctx.fillStyle = BRAND.accent;
        ctx.fillRect(hx + p, hy, p*3, p*2);
        ctx.fillRect(hx + p*5, hy, p*3, p*2);
        ctx.fillRect(hx, hy + p*2, p*9, p*2);
        ctx.fillRect(hx + p, hy + p*4, p*7, p*2);
        ctx.fillRect(hx + p*2, hy + p*6, p*5, p);
        ctx.fillRect(hx + p*3, hy + p*7, p*3, p);
        // Shine
        ctx.fillStyle = '#ff9fc4';
        ctx.fillRect(hx + p*2, hy + p, p*2, p);
      }
    }
  }

  // Draw player
  if (!player.isDead || player.deathTimer < 1) {
    const blink = player.invincible > 0 && Math.floor(player.invincible * 10) % 2 === 0;
    if (!blink) {
      let animState = 'run';
      if (!player.onGround) animState = 'jump';
      else animState = player.animFrame === 0 ? 'run' : 'idle';

      const deadAlpha = player.isDead ? Math.max(0, 1 - player.deathTimer) : 1;
      ctx.globalAlpha = deadAlpha;
      drawCharacter(charKeys[selectedChar], player.x - 4, player.y - 2, animState, 3, player.facing);
      ctx.globalAlpha = 1;
    }
  }

  drawParticles();

  ctx.restore(); // camera

  // HUD
  drawHUD();

  ctx.restore(); // shake
}

function drawHUD() {
  // HUD background
  ctx.fillStyle = 'rgba(10,10,26,0.7)';
  ctx.fillRect(0, 0, GAME_W, 36);
  ctx.fillStyle = BRAND.primary;
  ctx.fillRect(0, 36, GAME_W, 2);

  // Score (far left)
  drawPixelText('SCORE: ' + score, 10, 13, 1.5, BRAND.white);

  // Timer (left-center)
  drawPixelText('TIME: ' + Math.floor(levelTime), 180, 13, 1.5, BRAND.light);

  // Level (center)
  const theme = LEVEL_THEMES[currentLevel];
  drawPixelText('LVL ' + (currentLevel + 1) + ' - ' + theme.name, GAME_W / 2, 13, 1.5, BRAND.secondary, true);

  // ESC hint
  drawPixelText('ESC:QUIT', GAME_W - 120, 13, 1, '#555');

  // Lives (far right — hearts)
  for (let i = 0; i < lives; i++) {
    ctx.fillStyle = BRAND.accent;
    const hx = GAME_W - 18 - i * 22;
    const hy = 18;
    // Pixel heart
    ctx.fillRect(hx - 6, hy - 5, 3, 3);
    ctx.fillRect(hx + 1, hy - 5, 3, 3);
    ctx.fillRect(hx - 8, hy - 2, 3, 3);
    ctx.fillRect(hx - 5, hy - 2, 3, 3);
    ctx.fillRect(hx - 2, hy - 2, 3, 3);
    ctx.fillRect(hx + 1, hy - 2, 3, 3);
    ctx.fillRect(hx - 6, hy + 1, 3, 3);
    ctx.fillRect(hx - 3, hy + 1, 3, 3);
    ctx.fillRect(hx, hy + 1, 3, 3);
    ctx.fillRect(hx - 5, hy + 4, 3, 3);
    ctx.fillRect(hx - 2, hy + 4, 3, 3);
    ctx.fillRect(hx - 3, hy + 7, 3, 3);
  }

  // Label Owner mode instruction overlay — fades out after 3 seconds
  if (charKeys[selectedChar] === 'ceo' && levelTime < 3) {
    ctx.globalAlpha = Math.max(0, 1 - levelTime / 3);
    ctx.fillStyle = 'rgba(10,10,26,0.5)';
    ctx.fillRect(GAME_W / 2 - 200, GAME_H - 70, 400, 30);
    drawPixelText('ARROWS TO MOVE - SPACE TO JUMP', GAME_W / 2, GAME_H - 62, 1.5, BRAND.gold, true);
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// STATE: PAUSED
// ============================================================
function updatePaused(dt) {
  if (wasJustPressed('Space') || wasJustPressed('KeyP')) {
    gameState = STATE.PLAYING;
  }
  if (wasJustPressed('Escape')) {
    // Quit to Game Over
    gameState = STATE.GAME_OVER;
    stateTimer = 0;
    menuSelection = 0;
    gameOverQuip = GAME_OVER_QUIPS[Math.floor(Math.random() * GAME_OVER_QUIPS.length)];
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('teamrun_highscore', highScore.toString());
    }
  }
}

function drawPaused() {
  drawPlaying();
  ctx.fillStyle = 'rgba(10,10,26,0.7)';
  ctx.fillRect(0, 0, GAME_W, GAME_H);
  drawPixelText('PAUSED', GAME_W / 2, GAME_H / 2 - 30, 6, BRAND.white, true);
  drawPixelText('SPACE TO CONTINUE', GAME_W / 2, GAME_H / 2 + 30, 2, BRAND.secondary, true);
  drawPixelText('ESC TO QUIT GAME', GAME_W / 2, GAME_H / 2 + 55, 2, BRAND.red, true);
}

// ============================================================
// STATE: LEVEL COMPLETE
// ============================================================
function updateLevelComplete(dt) {
  stateTimer += dt;
  updateParticles();

  // Confetti
  if (Math.random() < 0.3) {
    const colors = [BRAND.primary, BRAND.accent, BRAND.gold, BRAND.green, BRAND.cyan];
    spawnParticles(Math.random() * GAME_W, -10, colors[Math.floor(Math.random() * colors.length)], 2);
  }

  if (stateTimer > 2 && (wasJustPressed('Space') || wasJustPressed('Enter'))) {
    if (currentLevel < 4) {
      currentLevel++;
      startLevel(currentLevel);
      gameState = STATE.COUNTDOWN;
      stateTimer = 0;
      countdownNum = 3;
    } else {
      // All levels complete!
      gameState = STATE.VICTORY;
      stateTimer = 0;
      menuSelection = 0;
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('teamrun_highscore', highScore.toString());
      }
    }
  }
}

function drawLevelComplete() {
  ctx.fillStyle = BRAND.dark;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  drawPixelText('LEVEL ' + (currentLevel + 1) + ' COMPLETE!', GAME_W / 2, 80, 4, BRAND.green, true);

  // Score breakdown
  drawPixelText('ITEMS COLLECTED: +' + levelScore, GAME_W / 2, 170, 2, BRAND.white, true);
  const timeBonus = Math.max(0, Math.floor((120 - levelTime) * 10));
  drawPixelText('TIME BONUS: +' + timeBonus, GAME_W / 2, 200, 2, BRAND.gold, true);
  drawPixelText('TOTAL SCORE: ' + score, GAME_W / 2, 240, 3, BRAND.accent, true);

  // Character celebrating
  const bounceY = Math.abs(Math.sin(stateTimer * 5)) * 20;
  drawCharacter(charKeys[selectedChar], GAME_W / 2 - 18, 280 - bounceY, 'jump', 4);

  if (stateTimer > 2 && Math.floor(stateTimer * 2) % 2 === 0) {
    const nextText = currentLevel < 4 ? 'PRESS SPACE FOR NEXT LEVEL' : 'PRESS SPACE TO FINISH';
    drawPixelText(nextText, GAME_W / 2, GAME_H - 40, 2, BRAND.white, true);
  }

  drawParticles();
}

// ============================================================
// STATE: GAME OVER
// ============================================================
function menuNavigate(dt) {
  // Up/Down move between rows: 0=Try Again, 1=CTA, 2+=social icons
  // Left/Right move within the social icons row
  if (wasJustPressed('ArrowDown') || wasJustPressed('KeyS')) {
    sfxMenuSelect();
    if (menuSelection < 2) {
      menuSelection++;
    } else {
      // Already on social row — wrap to top
      menuSelection = 0;
    }
  }
  if (wasJustPressed('ArrowUp') || wasJustPressed('KeyW')) {
    sfxMenuSelect();
    if (menuSelection === 0) {
      menuSelection = 2; // wrap to social row
    } else if (menuSelection >= 2) {
      menuSelection = 1;
    } else {
      menuSelection--;
    }
  }
  if (wasJustPressed('ArrowRight') || wasJustPressed('KeyD')) {
    sfxMenuSelect();
    if (menuSelection >= 2) {
      menuSelection = menuSelection < MENU_TOTAL_ITEMS - 1 ? menuSelection + 1 : 2;
    } else {
      menuSelection++;
      if (menuSelection > MENU_TOTAL_ITEMS - 1) menuSelection = 0;
    }
  }
  if (wasJustPressed('ArrowLeft') || wasJustPressed('KeyA')) {
    sfxMenuSelect();
    if (menuSelection >= 2) {
      menuSelection = menuSelection > 2 ? menuSelection - 1 : MENU_TOTAL_ITEMS - 1;
    } else {
      menuSelection--;
      if (menuSelection < 0) menuSelection = MENU_TOTAL_ITEMS - 1;
    }
  }
}

function menuConfirm() {
  if (!(wasJustPressed('Space') || wasJustPressed('Enter'))) return false;
  sfxMenuSelect();
  if (menuSelection === 0) {
    // Try Again / Play Again
    gameState = STATE.CHAR_SELECT;
    stateTimer = 0;
    return true;
  } else if (menuSelection === 1) {
    // CTA
    window.open('https://teamrollouts.com', '_blank');
    return true;
  } else {
    // Social share
    const platform = MENU_SOCIAL_PLATFORMS[menuSelection - 2];
    shareTo(platform);
    return true;
  }
}

function updateGameOver(dt) {
  stateTimer += dt;
  updateParticles();

  if (stateTimer > 1.5) {
    menuNavigate(dt);
    menuConfirm();
  }
}

function drawGameOver() {
  ctx.fillStyle = BRAND.dark;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Glitch effect
  if (stateTimer < 1) {
    for (let i = 0; i < 5; i++) {
      const gy = Math.random() * GAME_H;
      const gh = 2 + Math.random() * 8;
      ctx.fillStyle = `rgba(225,112,85,${Math.random() * 0.3})`;
      ctx.fillRect(Math.random() * 20 - 10, gy, GAME_W, gh);
    }
  }

  const alpha = Math.min(1, stateTimer / 0.5);
  ctx.globalAlpha = alpha;

  drawPixelText('GAME OVER', GAME_W / 2, 50, 7, BRAND.red, true);
  drawPixelText(gameOverQuip, GAME_W / 2, 110, 1.5, BRAND.accent, true);

  drawPixelText('FINAL SCORE: ' + score, GAME_W / 2, 150, 3, BRAND.white, true);
  drawPixelText('LEVEL REACHED: ' + (currentLevel + 1) + '/5', GAME_W / 2, 190, 2, BRAND.secondary, true);
  drawPixelText('ITEMS COLLECTED: ' + totalCollected, GAME_W / 2, 220, 2, BRAND.secondary, true);

  if (score >= highScore && score > 0) {
    drawPixelText('NEW HIGH SCORE!', GAME_W / 2, 260, 2, BRAND.gold, true);
  }

  ctx.globalAlpha = 1;

  if (stateTimer > 1.5) {
    drawButton('TRY AGAIN', GAME_W / 2 - 100, 310, 200, 40, menuSelection === 0);
    drawButton('TEAMROLLOUTS.COM', GAME_W / 2 - 120, 360, 240, 40, menuSelection === 1);
    drawShareButtons(410, `Final Score: ${score}`);

    // Navigation hint
    drawPixelText('ARROWS TO NAVIGATE  -  SPACE TO SELECT', GAME_W / 2, GAME_H - 12, 1, BRAND.light, true);
  }
}

// ============================================================
// STATE: VICTORY
// ============================================================
function updateVictory(dt) {
  stateTimer += dt;
  updateParticles();

  // Confetti
  if (Math.random() < 0.4) {
    const colors = [BRAND.primary, BRAND.accent, BRAND.gold, BRAND.green, BRAND.cyan, BRAND.white];
    spawnParticles(Math.random() * GAME_W, -10, colors[Math.floor(Math.random() * colors.length)], 3);
  }

  if (stateTimer > 2) {
    menuNavigate(dt);
    menuConfirm();
  }
}

function drawVictory() {
  // Epic background
  const grad = ctx.createLinearGradient(0, 0, 0, GAME_H);
  grad.addColorStop(0, '#1a0a2e');
  grad.addColorStop(0.5, '#2d1b69');
  grad.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Title
  drawPixelText('YOU DID IT!', GAME_W / 2, 30, 5, BRAND.gold, true);
  drawPixelText('ALL 5 LEVELS COMPLETE', GAME_W / 2, 75, 2, BRAND.white, true);

  // Podium
  const podiumY = 200;
  // #2 position
  ctx.fillStyle = '#888';
  ctx.fillRect(GAME_W / 2 - 100, podiumY + 30, 60, 50);
  drawPixelText('2', GAME_W / 2 - 70, podiumY + 40, 2, BRAND.white, true);

  // #1 position (player)
  ctx.fillStyle = BRAND.gold;
  ctx.fillRect(GAME_W / 2 - 30, podiumY, 60, 80);
  drawPixelText('1', GAME_W / 2, podiumY + 10, 2, BRAND.dark, true);

  // #3 position
  ctx.fillStyle = '#CD7F32';
  ctx.fillRect(GAME_W / 2 + 40, podiumY + 45, 60, 35);
  drawPixelText('3', GAME_W / 2 + 70, podiumY + 52, 2, BRAND.white, true);

  // Character on podium
  const bounceY = Math.abs(Math.sin(stateTimer * 3)) * 10;
  drawCharacter(charKeys[selectedChar], GAME_W / 2 - 18, podiumY - 40 - bounceY, 'jump', 3);

  // Stats
  drawPixelText('FINAL SCORE: ' + score, GAME_W / 2, podiumY + 95, 3, BRAND.accent, true);
  drawPixelText('ITEMS: ' + totalCollected + '  DEATHS: ' + deathCount, GAME_W / 2, podiumY + 125, 1.5, BRAND.light, true);

  if (score >= highScore) {
    drawPixelText('NEW HIGH SCORE!', GAME_W / 2, podiumY + 145, 2, BRAND.gold, true);
  }

  if (stateTimer > 2) {
    drawButton('PLAY AGAIN', GAME_W / 2 - 110, 380, 220, 40, menuSelection === 0);
    drawButton('SEE WHAT TEAM CAN DO', GAME_W / 2 - 140, 430, 280, 40, menuSelection === 1);
    drawShareButtons(475, `Final Score: ${score}`);

    drawPixelText('ARROWS TO NAVIGATE  -  SPACE TO SELECT', GAME_W / 2, GAME_H - 15, 1, BRAND.light, true);
  } else {
    drawPixelText('POWERED BY TEAM - THE OS FOR MUSIC RELEASES', GAME_W / 2, GAME_H - 15, 1, BRAND.secondary, true);
  }

  drawParticles();
}

// ============================================================
// KONAMI CODE EASTER EGG
// ============================================================
const KONAMI = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight'];
let konamiIdx = 0;
let ceoUnlocked = false;

// Unlock flash overlay state
let unlockFlashTimer = 0;
let unlockFlashActive = false;

function checkKonami(code) {
  // Works on title screen AND character select
  if (gameState !== STATE.TITLE && gameState !== STATE.CHAR_SELECT) return;
  if (code === KONAMI[konamiIdx]) {
    konamiIdx++;
    if (konamiIdx === KONAMI.length) {
      konamiIdx = 0;
      if (!ceoUnlocked) {
        ceoUnlocked = true;
        // Add Label Owner character
        CHAR_SPRITES.ceo = {
          name: 'LABEL OWNER',
          tagline: 'Easy mode!',
          color1: '#FDCB6E', color2: '#F9CA24', skin: '#FFEAA7',
          idle: [
            '   YYYYYY   ',
            '   YYYYYY   ',
            '   YssYYY   ',
            '   YssYYY   ',
            '    ssss    ',
            '   KKKKKK   ',
            '   KKKKKK   ',
            '    KKKK    ',
            '    KKKK    ',
            '   KK  KK   ',
            '   KK  KK   ',
            '   YY  YY   ',
          ].map(r => r.split('')),
          run1: [
            '   YYYYYY   ',
            '   YYYYYY   ',
            '   YssYYY   ',
            '   YssYYY   ',
            '    ssss    ',
            '    KKKK    ',
            '   KKKKKK   ',
            '    KKKK    ',
            '   KK KK    ',
            '   KK  KK   ',
            '  YY    YY  ',
            '            ',
          ].map(r => r.split('')),
          jump: [
            '   YYYYYY   ',
            '   YYYYYY   ',
            '   YssYYY   ',
            '   YssYYY   ',
            '    ssss    ',
            '  WWKKKKWW  ',
            '   KKKKKK   ',
            '    KKKK    ',
            '    KKKK    ',
            '   KK  KK   ',
            '   YY  YY   ',
            '            ',
          ].map(r => r.split('')),
        };
        charKeys.push('ceo');

        // Switch to char select with the new character focused
        gameState = STATE.CHAR_SELECT;
        selectedChar = charKeys.length - 1; // Focus on Label Owner
        stateTimer = 0;

        // Start unlock flash animation
        unlockFlashActive = true;
        unlockFlashTimer = 0;

        // Particles + victory fanfare
        spawnParticles(GAME_W / 2, GAME_H / 2, BRAND.gold, 50);
        spawnParticles(GAME_W / 2 - 80, GAME_H / 2 - 40, BRAND.green, 25);
        spawnParticles(GAME_W / 2 + 80, GAME_H / 2 - 40, BRAND.green, 25);
        // Ascending fanfare
        [440, 554, 659, 880, 1047].forEach((f, i) =>
          setTimeout(() => playTone(f, 0.2, 'square', 0.1), i * 120)
        );
      }
    }
  } else {
    konamiIdx = 0;
  }
}
window.addEventListener('keydown', e => checkKonami(e.code));

// Draw the unlock flash overlay (called from game loop)
function updateAndDrawUnlockFlash(dt) {
  if (!unlockFlashActive) return;
  unlockFlashTimer += dt;
  const t = unlockFlashTimer;

  // Solid dark background — completely covers everything underneath
  ctx.fillStyle = BRAND.dark;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Initial bright green flash (first 0.3s)
  if (t < 0.3) {
    ctx.fillStyle = 'rgba(217,250,135,' + (0.6 * (1 - t / 0.3)).toFixed(2) + ')';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
  }

  // Radial glow behind text
  const grd = ctx.createRadialGradient(GAME_W / 2, GAME_H / 2 - 20, 0, GAME_W / 2, GAME_H / 2 - 20, 250);
  grd.addColorStop(0, 'rgba(217,250,135,0.15)');
  grd.addColorStop(1, 'rgba(217,250,135,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Scale bounce in
  const scale = t < 0.3 ? 4 + (1 - t / 0.3) * 4 : 4 + Math.sin(t * 3) * 0.3;

  // Main text
  drawPixelText('LABEL OWNER', GAME_W / 2, GAME_H / 2 - 60, scale, BRAND.gold, true);
  drawPixelText('UNLOCKED!', GAME_W / 2, GAME_H / 2 + 5, scale * 0.8, BRAND.green, true);

  // Subtext fades in
  if (t > 0.5) {
    const subAlpha = Math.min(1, (t - 0.5) / 0.3);
    ctx.globalAlpha = subAlpha;
    drawPixelText('FULL CONTROL + EXTRA JUMP HEIGHT', GAME_W / 2, GAME_H / 2 + 70, 2, BRAND.light, true);
    ctx.globalAlpha = 1;
  }

  // Spawn trailing particles
  if (Math.floor(t * 8) % 2 === 0) {
    spawnParticles(
      GAME_W / 2 + (Math.random() - 0.5) * 400,
      GAME_H / 2 + (Math.random() - 0.5) * 150,
      Math.random() > 0.5 ? BRAND.gold : BRAND.green, 2
    );
  }

  // Scanline effect for consistency
  ctx.fillStyle = 'rgba(0,0,0,0.04)';
  for (let sy = 0; sy < GAME_H; sy += 3) {
    ctx.fillRect(0, sy, GAME_W, 1);
  }

  // Dismiss on any key after 1s, or auto after 3s → goes to char select with Label Owner focused
  if ((t > 1 && (wasJustPressed('Space') || wasJustPressed('Enter') || wasJustPressed('ArrowLeft') || wasJustPressed('ArrowRight'))) || t > 3) {
    unlockFlashActive = false;
  }
}

// ============================================================
// MAIN GAME LOOP
// ============================================================
let lastTime = 0;

function gameLoop(timestamp) {
  const dt = Math.min(0.05, (timestamp - lastTime) / 1000);
  lastTime = timestamp;

  // Clear
  ctx.fillStyle = BRAND.dark;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Update & Draw based on state
  switch (gameState) {
    case STATE.SPLASH:
      updateSplash(dt);
      drawSplash();
      break;
    case STATE.TITLE:
      updateTitle(dt);
      drawTitle();
      break;
    case STATE.CHAR_SELECT:
      updateCharSelect(dt);
      drawCharSelect();
      break;
    case STATE.INSTRUCTIONS:
      updateInstructions(dt);
      drawInstructions();
      break;
    case STATE.COUNTDOWN:
      updateCountdown(dt);
      drawCountdown();
      break;
    case STATE.PLAYING:
      updatePlaying(dt);
      drawPlaying();
      break;
    case STATE.PAUSED:
      updatePaused(dt);
      drawPaused();
      break;
    case STATE.LEVEL_COMPLETE:
      updateLevelComplete(dt);
      drawLevelComplete();
      break;
    case STATE.GAME_OVER:
      updateGameOver(dt);
      drawGameOver();
      break;
    case STATE.VICTORY:
      updateVictory(dt);
      drawVictory();
      break;
  }

  // Scanline overlay (subtle retro effect)
  ctx.fillStyle = 'rgba(0,0,0,0.04)';
  for (let sy = 0; sy < GAME_H; sy += 3) {
    ctx.fillRect(0, sy, GAME_W, 1);
  }

  // Music toggle indicator (top-right, all screens except splash)
  if (gameState !== STATE.SPLASH) {
    const mCol = musicEnabled ? BRAND.green : BRAND.secondary;
    const mSymbol = musicEnabled ? '♪' : '♪';
    // Draw speaker icon as a simple filled/unfilled indicator
    ctx.fillStyle = mCol;
    ctx.fillRect(GAME_W - 120, 10, 8, 10);
    ctx.beginPath();
    ctx.moveTo(GAME_W - 112, 8);
    ctx.lineTo(GAME_W - 104, 3);
    ctx.lineTo(GAME_W - 104, 27);
    ctx.lineTo(GAME_W - 112, 22);
    ctx.fill();
    if (musicEnabled) {
      // Sound waves
      ctx.strokeStyle = mCol;
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(GAME_W - 100, 15, 6, -0.8, 0.8); ctx.stroke();
      ctx.beginPath(); ctx.arc(GAME_W - 100, 15, 11, -0.6, 0.6); ctx.stroke();
    } else {
      // X through speaker
      ctx.strokeStyle = '#EF4444';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(GAME_W - 102, 6); ctx.lineTo(GAME_W - 92, 24); ctx.stroke();
    }
    drawPixelText('PRESS M TO MUTE', GAME_W - 82, 12, 1, BRAND.secondary, false);
  }

  // Unlock flash overlay (draws on top of everything)
  updateAndDrawUnlockFlash(dt);

  // Toggle music with M key
  if (wasJustPressed('KeyM')) {
    toggleMusic();
  }

  // Reset click
  clicked = false;
  clickX = -1;
  clickY = -1;

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
